# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  # 时区配置（影响所有时间显示、调度系统判断、数据存储）
  # 常用时区：
  #   - Asia/Shanghai (北京时间 UTC+8)
  #   - America/New_York (美东时间 UTC-5/-4)
  #   - Europe/London (伦敦时间 UTC+0/+1)
  # 完整时区列表: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  timezone: "Asia/Shanghai"
  show_version_update: true           # 显示版本更新提示


# ===============================================================
# 1.5 调度系统 —— 什么时间做什么事
#
# 通过 timeline.yaml 里定义的时间段来自动决定：
#   - 什么时候推送通知
#   - 什么时候做 AI 分析
#   - 用什么报告模式
#
# 快速上手：选一个预设模板，改 preset 的值就行
#
#   always_on       → 全天候，有新增即推送
#   morning_evening → 全天推送 + 晚间当日汇总（推荐）
#   office_hours    → 工作日三段式（到岗→午间→收工），周末增量自由推
#   night_owl       → 午后速览 + 深夜全天汇总
#   custom          → 完全自定义，详见 timeline.yaml
#
# 详细时间线图请查看 config/timeline.yaml
# ===============================================================
schedule:
  enabled: true                         # 是否启用调度系统
  preset: "morning_evening"             # 预设模板名称（见上方说明）


# ===============================================================
# 2. 数据源 - 热榜平台
#
# enabled: 是否启用热榜抓取（总开关）
# sources: 平台列表
#   - id: 平台唯一标识（勿修改）
#   - name: 显示名称（可自定义，修改后不影响运行）
# ===============================================================
platforms:
  enabled: true                         # 是否启用热榜平台抓取
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "tieba"
      name: "贴吧"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"


# ===============================================================
# 3. 筛选模式
# ===============================================================
filter:
  # 筛选方式（必填）
  # keyword: 使用关键词文件筛选
  # ai     : 使用 AI 筛选（需要 API Key）
  method: "keyword"                     # 改为 keyword 模式，不需要 AI API Key

  # 🔸 url_filter 配置
  # 控制是否开启高频去重功能（过滤掉同源同内容的新闻）
  url_filter:
    enabled: true                       # 是否启用 URL 去重
    expire_hours: 24                    # 去重记录保留小时数

  # 🔸 历史匹配去重（同一条新闻只推送一次）
  history_dedup:
    enabled: true                       # 是否启用历史去重
    expire_days: 7                      # 去重记录保留天数

  # 🔸 关键词筛选配置
  keyword:
    # 匹配模式
    #   any      : 包含任意一个关键词即推送（广告行业的客户，多个兴趣方向交叉）
    #   all      : 必须包含所有关键词才推送
    #   weighted : 加权模式，分数达标才推送
    mode: "any"                        # any 模式：命中任意关键词就推送

    # 匹配策略
    #   title_only    : 只匹配标题
    #   title_content : 匹配标题和内容（如有）
    match_scope: "title_only"           # 只匹配新闻标题，速度更快

  max_results: 100                      # 单次匹配最大结果数


# ===============================================================
# 4. AI 分析 —— 由你掌控的智能洞察（需要自行配置 API Key）
# ===============================================================
ai_analysis:
  enabled: false                        # 不使用 AI 分析
  # 以下配置在 enabled: false 时不会生效
  score_threshold: 60
  summary:
    enabled: false
    daily_summary: false
    weekly_summary: false


# ===============================================================
# 6. AI 翻译 —— 多语言新闻翻译
# ===============================================================
ai_translation:
  enabled: false                        # 不使用 AI 翻译
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: false
    standalone: false


# ===============================================================
# 7. 通知推送
# ===============================================================
notification:
  # 基本配置
  channels:
    wework:
      enabled: true                     # 启用企业微信推送
      webhook_url: ""                   # 留空，使用 GitHub Secret: WEWORK_WEBHOOK_URL

  # 推送消息设置
  message:
    batch_size: 4000
    batch_interval: 1
    separator: "━━━━━━━━━━━━━━━━━━━"
    max_title_length: 50
    show_platform: true
    show_rank: true

  # 静默推送
  silent_push:
    enabled: false
    time_range:
      start: "20:00"
      end: "22:00"
    once_per_day: true

  # 推送记录保留
  push_record_retention_days: 7


# ===============================================================
# 8. 通知内容配置
# ===============================================================
display:
  title: "📡 今日热点雷达"
  show_timestamp: true
  show_source_count: true
  regions:
    hotlist: true
    rss: false
    standalone: false
  news_item:
    show_index: true
    show_platform_tag: true
    show_rank_badge: true
    content_format: "{index}. [{platform}] {title} {hot_badge}"
